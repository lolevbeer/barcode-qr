    <main class="layout">
      <div class="controls-col">
        <!-- ===================== BARCODE CONTROLS ===================== -->
        <section class="panel" data-panel="barcode" aria-label="Barcode controls">
          <div class="field span-2">
            <label for="bc-tier">Tier</label>
            <select id="bc-tier">
              <option value="1" selected>Tier 1</option>
              <option value="2">Tier 2</option>
              <option value="3">Tier 3</option>
              <option value="4">Tier 4</option>
              <option value="5">Tier 5</option>
              <option value="6">Tier 6</option>
              <option value="7">Tier 7</option>
            </select>
          </div>

          <div class="field span-2">
            <label for="bc-data">Data</label>
            <input id="bc-data" type="text" value="850051366040" autocomplete="off" spellcheck="false" />
          </div>

          <div class="field">
            <label for="bc-height">Height</label>
            <input id="bc-height" type="number" value="15" min="10" max="320" step="5" />
          </div>
          <div class="field span-2">
            <label for="bc-rotation">Rotation</label>
            <select id="bc-rotation">
              <option value="0">0°</option>
              <option value="90">90°</option>
              <option value="180">180°</option>
              <option value="270" selected>270°</option>
            </select>
          </div>

          <label class="toggle span-2"><input id="bc-display" type="checkbox" checked /><span>Show value text</span></label>

          <p class="error" id="bc-error" role="alert"></p>

          <div class="actions span-2">
            <button class="btn primary" id="bc-download-svg">Download SVG</button>
          </div>
        </section>

        <!-- ======================= QR CONTROLS ======================= -->
        <section class="panel" data-panel="qr" aria-label="QR code controls" hidden>
          <div class="field span-2">
            <label for="qr-data">Data or URL</label>
            <textarea id="qr-data" rows="2" autocomplete="off" spellcheck="false">https://example.com</textarea>
          </div>

          <div class="field">
            <label for="qr-size">Size (px)</label>
            <input id="qr-size" type="number" value="50" min="40" max="1024" step="1" />
          </div>

          <p class="section">Style</p>
          <div class="field">
            <label for="qr-dot-type">Dots</label>
            <select id="qr-dot-type">
              <option value="square">Square</option>
              <option value="dots" selected>Dots</option>
              <option value="rounded">Rounded</option>
              <option value="extra-rounded">Extra rounded</option>
              <option value="classy">Classy</option>
              <option value="classy-rounded">Classy rounded</option>
            </select>
          </div>
          <div class="field">
            <label for="qr-cs-type">Eye frame</label>
            <select id="qr-cs-type">
              <option value="square">Square</option>
              <option value="dot" selected>Dot</option>
              <option value="extra-rounded">Extra rounded</option>
            </select>
          </div>
          <div class="field span-2">
            <label for="qr-cd-type">Eye center</label>
            <select id="qr-cd-type">
              <option value="dot" selected>Dot</option>
              <option value="square">Square</option>
            </select>
          </div>

          <div class="actions span-2">
            <button class="btn primary" id="qr-download-svg">Download SVG</button>
          </div>
        </section>
      </div>

      <!-- ======================= PREVIEW ======================= -->
      <section class="preview" aria-label="Preview">
        <p class="preview-label">Preview</p>
        <div class="preview-surface">
          <div class="paper" data-panel="barcode">
            <svg id="barcode" role="img" aria-label="Barcode preview"></svg>
          </div>
          <div class="paper" data-panel="qr" hidden>
            <div id="qr-canvas" role="img" aria-label="QR code preview"></div>
          </div>
        </div>
        <p class="preview-meta">exports SVG</p>
      </section>
    </main>
